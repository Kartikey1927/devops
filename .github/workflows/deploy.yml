name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Get your code into the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Authenticate with Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build and Push
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest

      # 4. Connect to AWS EC2 and Refresh Container
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest
            
            # Stop and remove existing container if it exists
            docker stop my-app || true
            docker rm my-app || true
            
            # FORCE KILL anything else using port 5000 (Prevents the "Port Allocated" error)
            sudo fuser -k 5000/tcp || true
            
            # Start the new container
            docker run -d --name my-app -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest
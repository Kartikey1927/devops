name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Get your code into the runner
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Authenticate with Docker Hub using your stored secrets
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build the container image and upload it to the registry
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest

      # 4. Connect to AWS EC2 via SSH and update the running container
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d --name my-app -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest

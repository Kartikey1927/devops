name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest

      - name: Copy Config Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # This moves your config files to the server's home directory
          source: "docker-compose.yml,prometheus.yml"
          target: "~/"

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest
            
            # 2. Shut down the stack
            # Since files are now at ~/, navigate there first
            cd ~
            docker-compose down || true
            
            # 3. Clear ports
            sudo fuser -k 5000/tcp 9090/tcp 3000/tcp || true
            sudo systemctl restart docker
            sleep 5
            
            # 4. Final launch
            docker-compose up -d

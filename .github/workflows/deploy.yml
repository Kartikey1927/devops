name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the image
            docker pull ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest
            
            # Stop existing container
            docker stop my-app || true
            docker rm my-app || true
            
            # Kill anything running on port 5000
            # This uses 'fuser' to find the PID and kill it
            sudo fuser -k 5000/tcp || true
            
            # Start the new container
            docker run -d --name my-app -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/hello-devops:latest